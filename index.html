<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lex Fridman Podcast — 中文精读 TTS 版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      padding: 40px 20px;
      text-align: center;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ffffff;
    }
    .subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 40px;
    }
    .feed-box {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .feed-label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .feed-url {
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #4ec9b0;
      word-break: break-all;
      background: #111;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #333;
    }
    .instructions {
      text-align: left;
      font-size: 0.9rem;
      color: #aaa;
      line-height: 1.8;
    }
    .instructions li { margin-bottom: 8px; }
    .badge {
      display: inline-block;
      background: #2a2a2a;
      color: #666;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎙️ Lex Fridman Podcast</h1>
    <p class="subtitle">中文精读 TTS 版 · AI 语音播客</p>

    <div class="feed-box">
      <div class="feed-label">RSS 订阅地址（复制到播客 app）</div>
      <div class="feed-url">https://goutou08.github.io/lex-fridman-podcast/feed.xml</div>
    </div>

    <ol class="instructions">
      <li>iPhone 打开<strong>播客</strong> app</li>
      <li>点击右上角头像 → <strong>设置</strong> → <strong>添加节目</strong></li>
      <li>粘贴上方 RSS 地址，搜索确认订阅</li>
    </ol>

    <span class="badge">Powered by Hermes Agent + GitHub Pages</span>
  </div>
</body>
</html>
